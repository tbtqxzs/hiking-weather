name: 徒步天气自动更新
on:
  schedule:
    - cron: '0 0,4,10 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 安装依赖
        run: pip install requests
      - name: 执行天气更新
        env:
          SC_KEY: ${{ secrets.SC_KEY }}
        run: |
          python -c "
import os
import requests
from datetime import datetime

W_MAP = {0:'☀️ 晴天',1:'🌤️ 晴间多云',2:'⛅ 多云',3:'☁️ 阴天',45:'🌫️ 雾',48:'🌫️ 雾凇',51:'🌧️ 毛毛雨',53:'🌧️ 毛毛雨',55:'🌧️ 毛毛雨',56:'🌨️ 冻毛毛雨',57:'🌨️ 冻毛毛雨',61:'🌦️ 小雨',63:'🌧️ 中雨',65:'🌧️ 大雨',66:'🌨️ 冻小雨',67:'🌨️ 冻大雨',71:'❄️ 小雪',73:'❄️ 中雪',75:'❄️ 大雪',77:'❄️ 雪粒',80:'🌦️ 阵雨',81:'🌦️ 中阵雨',82:'🌧️ 强阵雨',85:'🌨️ 阵雪',86:'🌨️ 强阵雪',95:'⛈️ 雷阵雨',96:'⛈️ 雷阵雨伴冰雹',99:'⛈️ 强雷阵雨'}

route_list = [{'name':'浙江-东白山','type':'single','lat':29.31,'lon':120.59,'required_days':1},{'name':'浙江-武功山','type':'multi','segments':[{'lat':27.45,'lon':114.13},{'lat':27.50,'lon':114.18},{'lat':27.55,'lon':114.23}],'required_days':3},{'name':'浙江-徽杭古道','type':'single','lat':30.08,'lon':118.85,'required_days':1},{'name':'浙江-清凉峰','type':'single','lat':30.05,'lon':118.83,'required_days':1},{'name':'浙江-七尖','type':'multi','segments':[{'lat':30.20,'lon':119.40},{'lat':30.22,'lon':119.45}],'required_days':2},{'name':'浙江-三尖','type':'multi','segments':[{'lat':30.28,'lon':119.55},{'lat':30.30,'lon':119.60}],'required_days':2},{'name':'浙江-龙王山','type':'single','lat':30.45,'lon':119.42,'required_days':1},{'name':'浙江-莫干山','type':'single','lat':30.61,'lon':119.93,'required_days':1},{'name':'浙江-雁荡山','type':'single','lat':28.30,'lon':121.10,'required_days':1},{'name':'浙江-楠溪江','type':'single','lat':28.35,'lon':120.60,'required_days':1},{'name':'浙江-天姥山','type':'single','lat':29.25,'lon':120.85,'required_days':1},{'name':'浙江-江郎山','type':'single','lat':28.60,'lon':118.65,'required_days':1},{'name':'浙江-仙都','type':'single','lat':28.55,'lon':120.15,'required_days':1},{'name':'浙江-括苍山','type':'single','lat':28.65,'lon':121.15,'required_days':1},{'name':'浙江-四明山','type':'single','lat':29.65,'lon':121.10,'required_days':1},{'name':'浙江-大盘山','type':'single','lat':28.90,'lon':120.50,'required_days':1},{'name':'浙江-百山祖','type':'single','lat':27.65,'lon':119.30,'required_days':1},{'name':'浙江-黄茅尖','type':'single','lat':27.80,'lon':119.25,'required_days':1},{'name':'浙江-南黄古道','type':'single','lat':29.15,'lon':121.05,'required_days':1},{'name':'浙江-茗岙梯田','type':'single','lat':28.38,'lon':120.58,'required_days':1},{'name':'浙江-公盂岩','type':'single','lat':28.75,'lon':120.65,'required_days':1},{'name':'浙江-神仙居','type':'single','lat':28.85,'lon':120.68,'required_days':1},{'name':'浙江-方岩','type':'single','lat':28.95,'lon':120.45,'required_days':1},{'name':'浙江-双龙洞','type':'single','lat':29.15,'lon':119.60,'required_days':1},{'name':'浙江-江厦森林公园','type':'single','lat':28.25,'lon':121.25,'required_days':1},{'name':'浙江-南麂岛','type':'single','lat':27.48,'lon':121.15,'required_days':1},{'name':'浙江-枸杞岛','type':'single','lat':30.75,'lon':122.45,'required_days':1},{'name':'浙江-桃花岛','type':'single','lat':29.85,'lon':122.20,'required_days':1},{'name':'浙江-普陀山','type':'single','lat':29.97,'lon':122.30,'required_days':1},{'name':'浙江-雪窦山','type':'single','lat':29.75,'lon':121.15,'required_days':1}]

def get_weather(lat, lon):
    url = f'https://api.open-meteo.com/v1/forecast?latitude={lat}&longitude={lon}&hourly=precipitation,weathercode&forecast_days=15'
    try:
        return requests.get(url, timeout=10).json()
    except:
        return None

def parse(data, name):
    if not data or 'hourly' not in data:
        return [], [], '查询失败'
    hourly = data['hourly']
    daily = {}
    for i, t in enumerate(hourly['time']):
        dt = datetime.fromisoformat(t)
        date = dt.strftime('%Y-%m-%d')
        h = dt.hour
        if date not in daily:
            daily[date] = {'rain':0, 'desc':''}
        if 9 <= h <= 18:
            daily[date]['rain'] += hourly['precipitation'][i] or 0
            if hourly['weathercode'][i] is not None:
                daily[date]['desc'] = W_MAP.get(hourly['weathercode'][i], '未知')
    days = sorted(daily.keys())
    flags = [daily[d]['rain'] <= 2.4 for d in days]
    output = []
    for d, ok in zip(days, flags):
        output.append(f'📅 {d} | 降雨:{round(daily[d]["rain"],2)}mm | {daily[d]["desc"]} | {"✅适宜" if ok else "❌不适宜"}')
    return days, flags, '\n'.join(output)

def get_consecutive(days, flags, need):
    periods = []
    i = 0
    while i < len(flags):
        if flags[i]:
            s = i
            while i < len(flags) and flags[i]:
                i += 1
            if i - s >= need:
                periods.append((days[s], days[i-1], i-s))
        else:
            i += 1
    return periods

ok_list, no_list = [], []
for route in route_list:
    if route['type'] == 'single':
        data = get_weather(route['lat'], route['lon'])
        days, flags, text = parse(data, route['name'])
        if not days:
            no_list.append(f'❌ {route["name"]}: 查询失败')
            continue
        periods = get_consecutive(days, flags, route['required_days'])
        if periods:
            for sd, ed, l in periods:
                ok_list.append(f'✅ {route["name"]}: {sd[5:]}至{ed[5:]}({l}天)')
        else:
            max_l = max(sum(flags[i:i+route['required_days']]) for i in range(len(flags)-route['required_days']+1)) if len(flags)>=route['required_days'] else 0
            no_list.append(f'❌ {route["name"]}: 最长连续{max_l}天')

title = f'{datetime.now().strftime("%m月%d日")} 徒步天气简报'
msg = '===== 适宜出行 =====\n' + '\n'.join(ok_list) + '\n\n===== 不适宜 =====\n' + '\n'.join(no_list)
msg += f'\n📅 更新时间: {datetime.now().strftime("%Y-%m-%d %H:%M")}'

SC_KEY = os.environ.get('SC_KEY', 'SCT357580TVk5EUvGsxh5gxuydclqjsL7j')
if SC_KEY:
    url = f'https://sctapi.ftqq.com/{SC_KEY}.send'
    requests.post(url, data={'text':title, 'desp':msg})
    print('✅ 微信推送成功')
else:
    print('⚠️ 未配置SC_KEY')
"
